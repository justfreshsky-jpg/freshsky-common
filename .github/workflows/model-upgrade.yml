name: model-upgrade-proposal

# Nightly: query provider catalogs whose free eligibility can be established
# safely. If a newer model matches upgrade_rules in models.json, open a draft
# PR proposing the bump. OpenRouter's rotating free router is retained and
# reported rather than replaced with one catalog model. No auto-merge.

on:
  schedule:
    - cron: '17 6 * * *'   # 06:17 UTC daily (off-peak; spreads load)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  scan-and-propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: pip install requests

      - name: Scan catalogs + propose upgrades
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python tools/scan_models.py > /tmp/upgrade_report.md || true
          cat /tmp/upgrade_report.md

      - name: Push proposal branch if changes
        run: |
          if git diff --quiet freshsky_common/models.json; then
            echo "no upgrades proposed — nothing to push"
            exit 0
          fi
          branch="model-upgrade-$(date -u +%Y%m%d)"
          git config user.name "freshsky-bot"
          git config user.email "admin@freshskyllc.com"
          git checkout -b "$branch"
          git add freshsky_common/models.json
          git commit -m "model registry: proposed upgrades $(date -u +%Y-%m-%d)"
          git push origin "$branch" --force-with-lease
          # GitHub Actions can't open PRs by default (repo setting). Attempt
          # the PR but don't fail the workflow if the org policy blocks it —
          # the branch is the artifact, operator reviews + opens PR manually.
          gh pr create --title "Model registry: proposed upgrades $(date -u +%Y-%m-%d)" \
            --body "$(cat /tmp/upgrade_report.md)" \
            --base main --head "$branch" --draft || \
            echo "::notice::PR creation blocked (org policy). Branch '$branch' pushed for manual review at https://github.com/${{ github.repository }}/compare/main...$branch"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
